query($owner:String!, $repo:String!) {
  repository(owner:$owner, name:$repo) {
    pullRequests(first:30, states:OPEN, orderBy:{field:UPDATED_AT, direction:DESC}) {
      nodes {
        number
        title
        reviewDecision
        mergeStateStatus
        url
        reviewThreads(first:100) { nodes { isResolved isOutdated } }
      }
    }
  }
}