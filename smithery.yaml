# Root-level Smithery / Glama shim.
# Glama scans the repository root, while the actual MCP package lives in
# `mcp-server/`. Keep this file aligned with `mcp-server/smithery.yaml`.
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - agentguardApiKey
    properties:
      agentguardApiKey:
        type: string
        description: AgentGuard read API key used to query traces, alerts, costs, and usage.
      agentguardUrl:
        type: string
        default: https://app.agentguard47.com
        description: Optional AgentGuard API base URL. Defaults to production.
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['/app/mcp-server/dist/index.js'],
      env: {
        AGENTGUARD_API_KEY: config.agentguardApiKey,
        ...(config.agentguardUrl
          ? { AGENTGUARD_URL: config.agentguardUrl }
          : {})
      }
    })
  exampleConfig:
    agentguardApiKey: ag_your_key_here
    agentguardUrl: https://app.agentguard47.com
