# Categorization for `gh release create --generate-notes`. PRs are grouped
# by label first, then by title prefix (when labels are missing).
#
# See docs/RELEASING.md for the cut-a-release flow.
changelog:
  exclude:
    labels:
      - skip-changelog
      - dependencies
  categories:
    - title: "🔒 Security"
      labels:
        - security
    - title: "✨ Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Fixes"
      labels:
        - bug
        - fix
    - title: "🏗️ Reliability & Infra"
      labels:
        - infra
        - reliability
        - performance
    - title: "📝 Docs"
      labels:
        - documentation
        - docs
    - title: "🧹 Other changes"
      labels:
        - "*"
