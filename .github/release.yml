# Categorization for `gh release create --generate-notes` (called from the
# final step of .github/workflows/publish.yml on every v* tag push).
#
# Categories are matched by PR label only — there is no title-prefix
# fallback in GitHub's generator. Labels follow the existing repo scheme
# (see ISSUE_TEMPLATE/*.yml and `gh label list`).
#
# See docs/RELEASING.md for the cut-a-release flow.
changelog:
  exclude:
    labels:
      - skip-changelog
      - dependencies
  categories:
    - title: "🔒 Security"
      labels:
        - type:security
    - title: "✨ Features"
      labels:
        - type:feature
        - enhancement
    - title: "🐛 Fixes"
      labels:
        - type:bug
        - bug
    - title: "🏗️ Performance & Refactors"
      labels:
        - type:perf
        - type:refactor
    - title: "🧪 CI & Tests"
      labels:
        - type:ci
        - type:test
    - title: "📝 Docs"
      labels:
        - type:docs
        - documentation
    - title: "🧹 Other changes"
      labels:
        - "*"
