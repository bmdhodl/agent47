name: Feature Request
description: Suggest a new SDK, MCP, CLI, docs, or example capability
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What is frustrating today?
      placeholder: "When I try to ..., I cannot because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include code examples if possible.
      placeholder: |
        ```python
        from agentguard import ...
        ```
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - SDK core (guards, tracing)
        - Integration (LangChain, LangGraph, CrewAI)
        - MCP server
        - CLI
        - Docs or examples
        - Other
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and why?
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? Be specific.
      placeholder: |
        - [ ] Guard raises an exception when the limit is exceeded
        - [ ] Works in local-only mode
        - [ ] Test coverage or proof artifact exists
    validations:
      required: true

  - type: dropdown
    id: roadmap
    attributes:
      label: Roadmap alignment
      description: Does this relate to an existing ops/03-ROADMAP item?
      options:
        - "Yes - existing Now/Next item"
        - "Yes - existing Later item"
        - "No - new idea"
    validations:
      required: true
