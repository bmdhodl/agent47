name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    env:
      PYTHONPATH: sdk
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install build and test tools
        run: python -m pip install --require-hashes -r .github/requirements/ci-tools.txt

      - name: Validate SDK release gates
        run: |
          python -m ruff check sdk/agentguard/ scripts/generate_pypi_readme.py scripts/sdk_preflight.py scripts/sdk_release_guard.py
          python -m bandit -r sdk/agentguard/ -s B101,B110,B112,B311 -q
          python -m pytest sdk/tests/ -v \
            --cov=agentguard \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Generate PyPI README
        run: python scripts/generate_pypi_readme.py --write

      - name: Validate release metadata sync
        run: python scripts/sdk_release_guard.py

      - name: Build package
        run: python -m build ./sdk
        env:
          # ZIP-based Python build tooling rejects timestamps before 1980.
          SOURCE_DATE_EPOCH: "315532800"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: sdk/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: sdk/dist/
          attestations: true
