name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install build and test tools
        run: |
          python -m pip install build pytest pytest-cov ruff bandit
          python -m pip install -e ./sdk

      - name: Validate SDK release gates
        run: |
          python -m ruff check sdk/agentguard/ scripts/generate_pypi_readme.py scripts/sdk_preflight.py scripts/sdk_release_guard.py
          python -m bandit -r sdk/agentguard/ -s B101,B110,B112,B311 -q
          python -m pytest sdk/tests/ -v \
            --cov=agentguard \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Generate PyPI README
        run: python scripts/generate_pypi_readme.py --write

      - name: Validate release metadata sync
        run: python scripts/sdk_release_guard.py

      - name: Build package
        run: python -m build ./sdk
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: sdk/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: sdk/dist/
          password: ${{ secrets.PYPI_TOKEN }}
          # To enable PyPI attestations, switch to Trusted Publishing:
          # 1. Configure at pypi.org -> agentguard47 -> Settings -> Publishing
          # 2. Remove the 'password' line above
          # 3. Add: attestations: true
