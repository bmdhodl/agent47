name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    env:
      PYTHONPATH: sdk
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Verify tag matches sdk/pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("sdk/pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match sdk/pyproject.toml version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Install build and test tools
        run: python -m pip install --require-hashes -r .github/requirements/ci-tools.txt

      - name: Validate SDK release gates
        run: |
          python -m ruff check sdk/agentguard/ scripts/generate_pypi_readme.py scripts/sdk_preflight.py scripts/sdk_release_guard.py
          python -m bandit -r sdk/agentguard/ -s B101,B110,B112,B311 -q
          python -m pytest sdk/tests/ -v \
            --cov=agentguard \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Generate PyPI README
        run: python scripts/generate_pypi_readme.py --write

      - name: Validate release metadata sync
        run: python scripts/sdk_release_guard.py

      - name: Build package
        run: python -m build ./sdk
        env:
          # ZIP-based Python build tooling rejects timestamps before 1980.
          SOURCE_DATE_EPOCH: "315532800"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: sdk/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: sdk/dist/
          attestations: true

  github-release:
    runs-on: ubuntu-latest
    needs: publish
    env:
      GH_REPO: ${{ github.repository }}
    permissions:
      contents: write
      actions: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists"
          else
            PREV_RELEASE_TAG="$(gh release list --exclude-drafts --exclude-pre-releases --json tagName --jq '.[].tagName' | awk -v current="$TAG" '$0 != current { print; exit }')"
            if [ -n "$PREV_RELEASE_TAG" ]; then
              gh release create "$TAG" \
                --title "$TAG" \
                --generate-notes \
                --notes-start-tag "$PREV_RELEASE_TAG" \
                --verify-tag
            else
              gh release create "$TAG" \
                --title "$TAG" \
                --generate-notes \
                --verify-tag
            fi
          fi

      - name: Trigger release announcements
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh workflow run release-content.yml -f tag="$TAG"
