name: Release

# Tag-triggered GitHub Release creation. Companion to publish.yml (PyPI upload)
# and release-content.yml (Discussion + social posts). All three fire on the
# same vX.Y.Z tag push.
#
# To cut a release:
#   1. Bump version in sdk/pyproject.toml on main.
#   2. Run scripts/sdk_release_guard.py locally to sanity-check metadata sync.
#   3. git tag v$(python -c "import tomllib; print(tomllib.load(open('sdk/pyproject.toml','rb'))['project']['version'])")
#   4. git push origin --tags
#
# This workflow validates the tag matches sdk/pyproject.toml, then creates the
# GitHub Release with --generate-notes. Notes are categorized per
# .github/release.yml (label-driven).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Verify tag matches sdk/pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("sdk/pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match sdk/pyproject.toml version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG
